name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency: release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # deploy key: the branch ruleset on main blocks GITHUB_TOKEN pushes (GitHub Actions
          # cannot be a bypass actor on personal repos) — deploy keys can, so the release
          # commit is pushed over SSH with this key
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: yarn
      - run: yarn install --immutable
      # quality gates (lint/typecheck/test/build) run in PR CI, enforced by the
      # ruleset's required status check with the up-to-date-branch policy — the
      # tree tested there is exactly the tree that lands here
      - run: yarn semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

name: PR Validation

# pull_request_target runs with write permissions from the BASE branch:
# safe only because no job ever checks out the PR head. Never add a checkout here.
on:
  pull_request_target:
    types: [opened, edited, reopened]

jobs:
  assign-author:
    name: Assign author
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: toshimaru/auto-author-assign@v2.1.1

  validate-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        id: lint_pr_title
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          requireScope: false

      - uses: marocchino/sticky-pull-request-comment@v2
        name: Explain the title error
        if: always() && (steps.lint_pr_title.outputs.error_message != null)
        with:
          header: pr-title-lint-error
          message: |
            Thanks for the pull request! 👋

            PR titles here must follow the [Conventional Commits specification](https://www.conventionalcommits.org/en/v1.0.0/) — the title becomes the squash commit, which drives the automated release.

            Details:

            ```
            ${{ steps.lint_pr_title.outputs.error_message }}
            ```

      - uses: marocchino/sticky-pull-request-comment@v2
        name: Remove the stale error comment
        if: ${{ steps.lint_pr_title.outputs.error_message == null }}
        with:
          header: pr-title-lint-error
          delete: true
